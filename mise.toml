experimental_monorepo_root = true
monorepo.config_roots = ["packages/*"]

[settings]
lockfile = true

[tools]
lefthook = "2.0.15"
"github:convco/convco" = "0.6.2"

[hooks]
postinstall = "lefthook install"

[tasks.diff]
description = "chezmoi diff, excluding lifecycle scripts"
run = "chezmoi diff --exclude scripts"

[tasks.apply]
description = "chezmoi apply with GITHUB_TOKEN from gh auth"
run = "GITHUB_TOKEN=$(gh auth token) chezmoi apply"

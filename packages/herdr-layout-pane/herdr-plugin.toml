id = "844196.layout-pane"
name = "layout pane"
version = "0.1.0"
min_herdr_version = "0.7.0"
platforms = ["linux", "macos"]

[[actions]]
id = "even-horizontal"
title = "even-horizontal ( | A | B | C | )"
command = ["bash", "-c", 'exec "${HERDR_PLUGIN_ROOT:?}/layout.sh"']

[[actions]]
id = "even-vertical"
title = "even-vertical ( A / B / C )"
command = ["bash", "-c", 'exec "${HERDR_PLUGIN_ROOT:?}/layout.sh"']

[[actions]]
id = "toggle"
title = "toggle ( horizontal <-> vertical )"
command = ["bash", "-c", 'exec "${HERDR_PLUGIN_ROOT:?}/layout.sh"']

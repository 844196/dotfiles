[tools]
deno = "1.41.1"

[tasks.build]
sources = ["main.ts"]
outputs = ["dist/git-add-A"]
run = "deno compile -A --output dist/git-add-A main.ts"

[tasks.install]
depends = ":build"
usage = '''
flag "--prefix <path>" default="{{env.HOME}}/.opt/dotfiles/opt/git-add-A/bin"
'''
run = """
mkdir -p ${usage_prefix}
cp dist/git-add-A ${usage_prefix}/git-add-A
"""

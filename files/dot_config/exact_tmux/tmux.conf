set -s set-clipboard on
set -s extended-keys on
set -g base-index 1
set -g renumber-windows on
set -g mouse on
set -s focus-events on
set -s escape-time 0
set -g repeat-time 1000
set -g display-panes-time 10000
set -wg pane-base-index 1
set -wg mode-keys vi


# Keybindings
# --------------------------------------------------------------------------------
set -g prefix C-t
unbind C-b
bind C-t send-prefix

bind -T pane_move h { swap-pane -d -t '{left-of}' ; switch-client -T pane_move }
bind -T pane_move j { swap-pane -d -t '{down-of}' ; switch-client -T pane_move }
bind -T pane_move k { swap-pane -d -t '{up-of}' ; switch-client -T pane_move }
bind -T pane_move l { swap-pane -d -t '{right-of}' ; switch-client -T pane_move }
bind -T pane_move Escape { switch-client -T root ; refresh-client }
bind -T pane_move q { switch-client -T root ; refresh-client }

bind -T pane_resize h { resize-pane -L ; switch-client -T pane_resize }
bind -T pane_resize j { resize-pane -D ; switch-client -T pane_resize }
bind -T pane_resize k { resize-pane -U ; switch-client -T pane_resize }
bind -T pane_resize l { resize-pane -R ; switch-client -T pane_resize }
bind -T pane_resize Escape { switch-client -T root ; refresh-client }
bind -T pane_resize q { switch-client -T root ; refresh-client }

bind -n C-Tab next-window
bind -n C-BTab previous-window

bind -n C-Up select-pane -U
bind -n C-Down select-pane -D
bind -n C-Left select-pane -L
bind -n C-Right select-pane -R

bind -n C-S-Up { swap-pane -d -t '{up-of}' ; switch-client -T pane_move }
bind -n C-S-Down { swap-pane -d -t '{down-of}' ; switch-client -T pane_move }
bind -n C-S-Left { swap-pane -d -t '{left-of}' ; switch-client -T pane_move }
bind -n C-S-Right { swap-pane -d -t '{right-of}' ; switch-client -T pane_move }

bind -T copy-mode-vi Space { send -X begin-selection ; set -p cursor-colour "#f7768e" }
bind -T copy-mode-vi v {
  if -F "#{selection_present}" \
    { send -X end-of-line ; send -X cursor-left } \
    { send -X begin-selection ; send -X cursor-right ; set -p cursor-colour "#f7768e" }
}
bind -T copy-mode-vi V { send -X select-line ; set -p cursor-colour "#f7768e" }
bind -T copy-mode-vi Escape { send -X clear-selection ; set -p cursor-colour "#e0af68" }

bind -n F8 display-menu -T "#[align=centre] Leader " -x C -y C \
  "Scratch" F8 "display-popup -E -w 80% -h 80% -d '#{pane_current_path}' -T '#[fg=white dim] Scratch '" \
  "Command prompt" : "command-prompt" \
  "Copy mode" y "copy-mode" \
  "Focus 1st window" 1 "select-window -t :1" \
  "Focus 2nd window" 2 "select-window -t :2" \
  "Focus 3rd window" 3 "select-window -t :3" \
  "Focus 4th window" 4 "select-window -t :4" \
  "Focus 5th window" 5 "select-window -t :5" \
  "Focus 6th window" 6 "select-window -t :6" \
  "Focus 7th window" 7 "select-window -t :7" \
  "Focus 8th window" 8 "select-window -t :8" \
  "Focus 9th window" 9 "select-window -t :9" \
  "+Window" w { display-menu -T "#[align=centre] +Window " -x C -y C \
    "New window"         c "new-window -c '#{pane_current_path}'" \
    "Split horizontal"   s "split-window -v -c '#{pane_current_path}'" \
    "Split vertical"     v "split-window -h -c '#{pane_current_path}'" \
    "Balance panes"      = "select-layout -E" \
    "Toggle layout"      Space { \
      if -F "#{==:#{@mylayout},0}" \
        { set -w @mylayout 1 ; select-layout even-vertical } \
        { if -F "#{==:#{@mylayout},1}" \
            { if -F "#{e|>=|:#{window_panes},4}" \
                { set -w @mylayout 2 ; select-layout tiled } \
                { set -w @mylayout 0 ; select-layout even-horizontal } } \
            { set -w @mylayout 0 ; select-layout even-horizontal } } \
    } \
    "Kill window"        d { if -F "#{==:#{session_windows},1}" "confirm-before -p 'Kill the last window? (y/n)' kill-window" "kill-window" } \
    "Kill other windows" D "kill-window -a" } \
  "+Pane" b { display-menu -T "#[align=centre] +Pane " -x C -y C \
    "Scratch"      s "display-popup -E -w 80% -h 80% -d '#{pane_current_path}' -T '#[fg=white dim] Scratch '" \
    "+New pane"    N { display-menu -T "#[align=centre] +New pane " -x C -y C \
      "New left"   h "split-window -h -b -c '#{pane_current_path}'" \
      "New down"   j "split-window -v -c '#{pane_current_path}'" \
      "New up"     k "split-window -v -b -c '#{pane_current_path}'" \
      "New right"  l "split-window -h -c '#{pane_current_path}'" } \
    "Move left"    h { swap-pane -d -t '{left-of}' ; switch-client -T pane_move } \
    "Move down"    j { swap-pane -d -t '{down-of}' ; switch-client -T pane_move } \
    "Move up"      k { swap-pane -d -t '{up-of}' ; switch-client -T pane_move } \
    "Move right"   l { swap-pane -d -t '{right-of}' ; switch-client -T pane_move } \
    "+Resize"      r { display-menu -T "#[align=centre] +Resize " -x C -y C \
      "Resize left"  h { resize-pane -L ; switch-client -T pane_resize } \
      "Resize down"  j { resize-pane -D ; switch-client -T pane_resize } \
      "Resize up"    k { resize-pane -U ; switch-client -T pane_resize } \
      "Resize right" l { resize-pane -R ; switch-client -T pane_resize } } \
    "Toggle zoom"  z "resize-pane -Z" \
    "Kill pane"    d { if -F "#{==:#{window_panes},1}" "confirm-before -p 'Kill the last pane? (y/n)' kill-pane" "kill-pane" } \
    "Kill other panes"  D "kill-pane -a" } \
  "+Session" s { display-menu -T "#[align=centre] +Session " -x C -y C \
    "New session"    c "command-prompt -p 'Session name:' 'new-session -s \"%%\"'" \
    "Rename session" r "command-prompt -I '#S' 'rename-session \"%%\"'" \
    "Detach"         d "detach-client" \
    "Kill session"   x "confirm-before -p 'Kill session #S? (y/n)' kill-session" } \
  "+Misc" '"' { display-menu -T "#[align=centre] +Misc " -x C -y C \
    "Reload config" r "source-file ~/.config/tmux/tmux.conf" }


# Colors
# --------------------------------------------------------------------------------
set -g display-panes-colour colour7
set -g display-panes-active-colour colour1
set -wg pane-border-style "bg=terminal fg=#{?#{==:#{client_key_table},root},#1d2230,cyan}"
set -wg pane-active-border-style "bg=terminal fg=#{?#{==:#{client_key_table},root},#1d2230,cyan}"
set -wg popup-border-style "fg=black dim bg=terminal"
set -wg popup-border-lines rounded
set -wg popup-style "bg=terminal"
set -wg mode-style "bg=#283457 fg=default"

set-hook -g pane-mode-changed { if -F "#{pane_in_mode}" { set -p cursor-colour "#e0af68" } { set -p cursor-colour default } }


# Statusline
# --------------------------------------------------------------------------------
set -g status-left ""
set -g status-right ""
set -g status-justify left
set -wg window-status-separator "  "
set -wg window-status-format "●"
set -wg window-status-current-format "●"

set -g status-style "bg=terminal fg=terminal nobold dim"
set -wg window-status-bell-style "fg=yellow dim"
set -wg window-status-current-style "#{?window_zoomed_flag,fg=cyan nobold,fg=white bold} nodim"

# ウィンドウが2つ以上あるときだけステータスラインを表示する
set -g status off
set-hook -g window-linked   'if -F "#{==:#{session_windows},1}" "set status off" "set status on"'
set-hook -g window-unlinked 'if -F "#{==:#{session_windows},1}" "set status off" "set status on"'
